name: tsc

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  tsc:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: source

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run tsc script
        run: npm run tsc
